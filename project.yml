name: VideoApp
options:
  minimumOSVersion: 15.0
targets:
  VideoApp:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - .git
          - .github
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      IPHONEOS_DEPLOYMENT_TARGET: 15.0
      PRODUCT_NAME: VideoApp
      EXECUTABLE_NAME: VideoApp
      PRODUCT_BUNDLE_IDENTIFIER: com.video.app
      SWIFT_VERSION: 5.0
      OTHER_LDFLAGS: ["-ObjC", "-framework", "IJKMediaFramework"]
    dependencies:
      - carthage: IJKMediaFramework
