name: Build iOS Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Carthage & XcodeGen
        run: |
          brew install carthage xcodegen
          
      - name: Download IJKPlayer Framework
        run: |
          mkdir -p Carthage/Build/iOS
          curl -L -o IJKMediaFramework.zip "https://github.com/bilibili/ijkplayer/releases/download/v0.8.8/IJKMediaFramework.framework.zip"
          unzip IJKMediaFramework.zip -d Carthage/Build/iOS/
          
      - name: Generate Xcode Project
        run: xcodegen generate
          
      - name: Build App
        run: xcodebuild build -scheme VideoApp -destination 'generic/platform=iOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -quiet
          
      - name: Make IPA
        run: |
          mkdir -p Payload
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/VideoApp.app Payload/
          cp -r Carthage/Build/iOS/IJKMediaFramework.framework Payload/VideoApp.app/Frameworks/
          zip -r VideoApp-TrollStore.ipa Payload/
          
      - uses: actions/upload-artifact@v4
        with:
          name: VideoApp-TrollStore
          path: VideoApp-TrollStore.ipa
