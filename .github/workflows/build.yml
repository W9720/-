name: Build iOS Unsigned IPA (TrollStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Unsigned IPA
        uses: yukiarrr/ios-build-action@v1.6.0
        with:
          project-path: .
          scheme: VideoApp
          output-path: VideoApp-TrollStore.ipa
          code-sign-identity: ""
          code-signing-required: false
          export-options: |
            {
              "method": "enterprise",
              "signingStyle": "manual"
            }

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoApp-TrollStore
          path: VideoApp-TrollStore.ipa
